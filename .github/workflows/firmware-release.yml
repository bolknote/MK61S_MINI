name: Firmware release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-tests:
    name: Host tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run host test suite
        env:
          MK61_TEST_SANITIZERS: "1"
        run: tests/run_all_tests.sh

  build-release:
    name: Build firmware
    needs: host-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      STM32_CORE_VERSION: 2.12.0
      STM32_PACKAGE_URL: https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json
      FQBN: STMicroelectronics:stm32:GenF4:pnum=BLACKPILL_F411CE,upload_method=dfuMethod,xserial=generic,usb=CDCgen,opt=osstd
      FQBN_LTO: STMicroelectronics:stm32:GenF4:pnum=BLACKPILL_F411CE,upload_method=dfuMethod,xserial=generic,usb=CDCgen,opt=o3lto

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install STM32 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls "$STM32_PACKAGE_URL"
          arduino-cli core update-index
          arduino-cli core install "STMicroelectronics:stm32@$STM32_CORE_VERSION"

      - name: Install Arduino libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "LiquidCrystal@1.0.7"
          arduino-cli lib install "STM32duino RTC@1.9.0"

      - name: Prepare sketch
        run: |
          mkdir -p "$RUNNER_TEMP/mk61s-M"
          cp -R code/. "$RUNNER_TEMP/mk61s-M/"
          mkdir -p firmware

      - name: Build LCD1602 A00 firmware
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-lcd1602-a00" \
            --build-property "compiler.cpp.extra_flags=-DMK61_LCD1602_A00" \
            "$RUNNER_TEMP/mk61s-M"
          cp "$RUNNER_TEMP/build-lcd1602-a00/mk61s-M.ino.bin" "firmware/mk61s-M-lcd1602-a00-f411-${GITHUB_SHA::7}.bin"

      - name: Compile-check LCD1602 A00 with USB Screen
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-lcd1602-a00-usb-screen" \
            --build-property "compiler.cpp.extra_flags=-DMK61_LCD1602_A00 -DMK61_ENABLE_USB_SCREEN=1" \
            "$RUNNER_TEMP/mk61s-M"

      # LiquidCrystal 1.0.7 определяет command() как inline только в .cpp.
      # Отдельная LTO-сборка не даёт случайно вернуть внешний вызов этого
      # отсутствующего символа из нашего LCD-транспорта.
      - name: Link-check LCD1602 A00 with LTO
        run: |
          arduino-cli compile \
            --fqbn "$FQBN_LTO" \
            --build-path "$RUNNER_TEMP/build-lcd1602-a00-lto" \
            --build-property "compiler.cpp.extra_flags=-DMK61_LCD1602_A00" \
            "$RUNNER_TEMP/mk61s-M"

      - name: Build LCD1602 A02 firmware
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-lcd1602-a02" \
            --build-property "compiler.cpp.extra_flags=-DMK61_LCD1602_A02" \
            "$RUNNER_TEMP/mk61s-M"
          cp "$RUNNER_TEMP/build-lcd1602-a02/mk61s-M.ino.bin" "firmware/mk61s-M-lcd1602-a02-f411-${GITHUB_SHA::7}.bin"

      - name: Build mini V2 LCD1602 A00 firmware
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-mini-v2-lcd1602-a00" \
            --build-property "compiler.cpp.extra_flags=-DREVISION_V2 -DMK61_LCD1602_A00" \
            "$RUNNER_TEMP/mk61s-M"
          cp "$RUNNER_TEMP/build-mini-v2-lcd1602-a00/mk61s-M.ino.bin" "firmware/mk61s-M-mini-v2-lcd1602-a00-f411-${GITHUB_SHA::7}.bin"

      - name: Build mini V2 LCD1602 A02 firmware
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-mini-v2-lcd1602-a02" \
            --build-property "compiler.cpp.extra_flags=-DREVISION_V2 -DMK61_LCD1602_A02" \
            "$RUNNER_TEMP/mk61s-M"
          cp "$RUNNER_TEMP/build-mini-v2-lcd1602-a02/mk61s-M.ino.bin" "firmware/mk61s-M-mini-v2-lcd1602-a02-f411-${GITHUB_SHA::7}.bin"

      - name: Build Classic V2 UC1609 firmware
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-classic-v2" \
            --build-property "compiler.cpp.extra_flags=-DMK61_BOARD_CLASSIC_V2" \
            "$RUNNER_TEMP/mk61s-M"
          cp "$RUNNER_TEMP/build-classic-v2/mk61s-M.ino.bin" "firmware/mk61s-M-classic-v2-uc1609-f411-${GITHUB_SHA::7}.bin"

      - name: Build Classic V3 UC1609 firmware
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-classic-v3" \
            --build-property "compiler.cpp.extra_flags=-DMK61_BOARD_CLASSIC_V3" \
            "$RUNNER_TEMP/mk61s-M"
          cp "$RUNNER_TEMP/build-classic-v3/mk61s-M.ino.bin" "firmware/mk61s-M-classic-v3-uc1609-f411-${GITHUB_SHA::7}.bin"

      - name: Compile-check Classic V3 UC1609 with USB Screen
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-classic-v3-usb-screen" \
            --build-property "compiler.cpp.extra_flags=-DMK61_BOARD_CLASSIC_V3 -DMK61_ENABLE_USB_SCREEN=1" \
            "$RUNNER_TEMP/mk61s-M"

      - name: Build MK61s 40th firmware
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-path "$RUNNER_TEMP/build-40th" \
            --build-property "compiler.cpp.extra_flags=-DMK61_BOARD_40TH" \
            "$RUNNER_TEMP/mk61s-M"
          cp "$RUNNER_TEMP/build-40th/mk61s-M.ino.bin" "firmware/mk61s-M-40th-f411-${GITHUB_SHA::7}.bin"

      - name: Build STM32F401CC firmware and loadable modules
        run: |
          tools/build_f401_bundle.sh \
            --profile mini-v3-a00 \
            --build-root "$RUNNER_TEMP/build-f401-bundle" \
            --output-dir firmware

      - name: Check pre-setup constructors
        run: |
          for elf in "$RUNNER_TEMP"/build-*/mk61s-M.ino.elf; do
            tests/check_global_constructors.sh "$elf"
          done

      - name: Write checksums
        run: |
          cd firmware
          find . -type f \( -name '*.bin' -o -name '*.MOD' \) -print \
            | sort | xargs sha256sum > SHA256SUMS.txt
          zip -qr mk61s-M-mini-v3-lcd1602-a00-f401.zip \
            mk61s-M-mini-v3-lcd1602-a00-f401

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mk61s-firmware-${{ github.sha }}
          path: firmware/*
          if-no-files-found: error

      - name: Create GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: firmware-${{ github.run_number }}-${{ github.sha }}
        run: |
          gh release create "$RELEASE_TAG" \
            firmware/*.bin firmware/*.zip firmware/SHA256SUMS.txt \
            --target "$GITHUB_SHA" \
            --title "Firmware ${GITHUB_SHA::7}" \
            --notes "Automated firmware build for ${GITHUB_SHA}."

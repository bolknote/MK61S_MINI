name: USB Screen desktop

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/mk61_usb_screen/**'
      - '.github/workflows/usb-screen-desktop.yml'
  pull_request:
    paths:
      - 'apps/mk61_usb_screen/**'
      - '.github/workflows/usb-screen-desktop.yml'

permissions:
  contents: read

concurrency:
  group: usb-screen-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.9'
  APP_DIR: apps/mk61_usb_screen

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux desktop toolchain
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve dependencies
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get

      - name: Static analysis
        working-directory: ${{ env.APP_DIR }}
        run: flutter analyze

      - name: Unit and integration tests
        working-directory: ${{ env.APP_DIR }}
        run: flutter test

  build:
    name: Build ${{ matrix.label }}
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal
            os: macos-latest
            target: macos
            archive: MK61-USB-Screen-macOS.zip
          - label: Windows x64
            os: windows-latest
            target: windows
            archive: MK61-USB-Screen-Windows-x64.zip
          - label: Linux x64
            os: ubuntu-latest
            target: linux
            archive: MK61-USB-Screen-Linux-x64.tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux desktop toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve dependencies
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get

      - name: Build release
        working-directory: ${{ env.APP_DIR }}
        run: flutter build ${{ matrix.target }} --release

      - name: Package macOS application
        if: runner.os == 'macOS'
        working-directory: ${{ env.APP_DIR }}
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          build/macos/Build/Products/Release/mk61_usb_screen.app
          ${{ matrix.archive }}

      - name: Package Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: ${{ env.APP_DIR }}
        run: >-
          Compress-Archive
          -Path build/windows/x64/runner/Release/*
          -DestinationPath ${{ matrix.archive }}

      - name: Package Linux application
        if: runner.os == 'Linux'
        working-directory: ${{ env.APP_DIR }}
        run: >-
          tar -C build/linux/x64/release
          -czf ${{ matrix.archive }} bundle

      - uses: actions/upload-artifact@v6
        with:
          name: usb-screen-${{ matrix.target }}
          path: ${{ env.APP_DIR }}/${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 14
